<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FootSystem By Pedro Mustafe - ERP Industrial Premium v4.2</title>
    <style>
        :root {
            --bg-deep: #05080f;
            --bg-primary: #080c14;
            --bg-secondary: #0d111a;
            --bg-tertiary: #111820;
            --bg-card: #0f161f;
            --bg-card-hover: #131c28;
            --bg-input: #141c28;
            --border: #1e2a3a;
            --border-light: #263548;
            --border-accent: #3a3a1a;
            --text-primary: #e8ecf4;
            --text-secondary: #a4b0c0;
            --text-muted: #5a6878;
            --gold: #d4a840;
            --gold-light: #f0c860;
            --gold-dark: #a07820;
            --gold-bg: rgba(212, 168, 64, 0.08);
            --gold-border: rgba(212, 168, 64, 0.25);
            --black: #000000;
            --white: #ffffff;
            --red: #e04040;
            --red-dark: #b02020;
            --green: #30b860;
            --green-dark: #208040;
            --blue: #5098e0;
            --blue-dark: #3068b0;
            --purple: #8850e0;
            --cyan: #30b8c0;
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.6);
            --shadow-gold: 0 4px 20px rgba(212, 168, 64, 0.2);
            --radius: 10px;
            --radius-sm: 6px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            --font-mono: 'SF Mono', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: var(--font);
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ... (o resto do CSS original) */

        /* Hamburger Menu for Mobile */
        .header-hamburger {
            display: none;
            font-size: 28px;
            background: none;
            border: none;
            color: var(--gold-light);
            cursor: pointer;
            padding: 8px;
        }

        @media (max-width: 768px) {
            .header-hamburger {
                display: block;
            }
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <!-- Conteúdo do HTML original -->
    <script>
        // ... o script original ...
        // Adicionar no final do script:
        console.log('FootSystem v4.2 - Mobile Optimized + Supabase Ready');
    </script>
</body>
</html>
